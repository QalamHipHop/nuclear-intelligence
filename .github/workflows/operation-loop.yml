name: ⚛️ Nuclear Intelligence Operation Loop v4.0

on:
  schedule:
    # Run every 30 minutes - optimized for always-online
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      force_category:
        description: 'Force category (optional)'
        required: false
        default: ''
  push:
    branches: [main]

env:
  PYTHON_VERSION: '3.11'

jobs:
  cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-nuclear-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-nuclear-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -q -r requirements.txt

      - name: Initialize knowledge base
        run: python scripts/initialize_knowledge_base.py || true

      - name: Run Nuclear Intelligence Cycle
        id: cycle
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          AIMLAPI_API_KEY: ${{ secrets.AIMLAPI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          FIREWORKS_API_KEY: ${{ secrets.FIREWORKS_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          BLOCKCHAIN_SECRET: ${{ secrets.BLOCKCHAIN_SECRET }}
          SCIENTIFIC_ACCURACY_THRESHOLD: 85
          MIN_NOVELTY_THRESHOLD: 65
          MIN_USEFULNESS_THRESHOLD: 70
          MIN_OVERALL_SCORE: 75
          MIN_COMPLETENESS_THRESHOLD: 50
          DEVELOPER_MODE: "true"
          AUTO_START_LOOP: "false"
        run: |
          python -c "
          import sys, os
          sys.path.insert(0, '.')
          from core.nuclear_intelligence_v4 import NuclearIntelligenceCore
          from core.operation_loop_v4 import OperationLoop, OperationLoopConfig
          from blockchain.virtual_ledger import VirtualLedger

          print('🚀 Initializing Nuclear Intelligence v4.0...')
          core = NuclearIntelligenceCore()
          ledger = VirtualLedger()
          
          config = OperationLoopConfig(
              interval_minutes=30,
              min_accuracy=float(os.getenv('SCIENTIFIC_ACCURACY_THRESHOLD', 85)),
              min_novelty=float(os.getenv('MIN_NOVELTY_THRESHOLD', 65)),
              min_usefulness=float(os.getenv('MIN_USEFULNESS_THRESHOLD', 70)),
              min_overall=float(os.getenv('MIN_OVERALL_SCORE', 75)),
              min_completeness=float(os.getenv('MIN_COMPLETENESS_THRESHOLD', 50)),
              auto_start=False,
              developer_mode=True,
              save_reports=True,
              sync_to_hf=True,
              sync_to_gh=True,
          )
          
          op_loop = OperationLoop(core, ledger, config=config)
          
          # Run the cycle
          category = '''${{ github.event.inputs.force_category }}''' if '''${{ github.event.inputs.force_category }}''' else ''
          result = op_loop.run_cycle(developer_mode=True, force_category=category)
          
          print()
          print('='*50)
          print(f'📊 CYCLE RESULT: {\"MINTED ✅\" if result.minted else \"REJECTED ❌\"}')
          print('='*50)
          print(f'Cycle ID: {result.cycle_id}')
          print(f'Provider: {core.llm._current_provider_name}')
          print(f'Time: {result.execution_time_seconds}s')
          print()
          print('📊 Scores:')
          print(f'  Accuracy: {result.evaluation.get(\"scientific_accuracy\", 0):.1f}%')
          print(f'  Novelty: {result.evaluation.get(\"novelty_score\", 0):.1f}%')
          print(f'  Usefulness: {result.evaluation.get(\"usefulness_score\", 0):.1f}%')
          print(f'  Completeness: {result.evaluation.get(\"completeness\", 0):.1f}%')
          print()
          if result.tx_hash:
              print(f'💰 TX Hash: {result.tx_hash[:40]}...')
          if result.error:
              print(f'❌ Error: {result.error}')
          print('='*50)
          
          # Output for GitHub Actions
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'minted={str(result.minted).lower()}\n')
              f.write(f'cycle_id={result.cycle_id}\n')
              f.write(f'provider={core.llm._current_provider_name or \"none\"}\n')
              f.write(f'execution_time={result.execution_time_seconds}\n')
          "

      - name: Sync to HuggingFace
        if: steps.cycle.outputs.minted == 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python scripts/sync_huggingface.py || true

      - name: Commit reports and updates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Auto: NES cycle report - ${{ steps.cycle.outputs.cycle_id }}"
          file_pattern: |
            reports/*.json
            knowledge_base/*.json
            knowledge_base/*.bin
          skip_dirty: false
          push_options: '--force'

  keepalive:
    runs-on: ubuntu-latest
    needs: cycle
    if: always()
    steps:
      - name: Ping HF Space
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://huggingface.co/spaces/Qalam/Nuclear-Intelligence)
          echo "HF Space Status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "⚠️ HF Space not responding, retrying..."
            sleep 5
            curl -s -o /dev/null -w "%{http_code}" https://huggingface.co/spaces/Qalam/Nuclear-Intelligence
          fi

  report:
    runs-on: ubuntu-latest
    needs: cycle
    if: always() && needs.cycle.outputs.minted == 'true'
    steps:
      - name: Create Cycle Summary
        run: |
          echo "## ⚛️ Nuclear Intelligence Cycle Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Cycle ID | \`${{ needs.cycle.outputs.cycle_id }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Provider | \`${{ needs.cycle.outputs.provider }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Execution Time | ${{ needs.cycle.outputs.execution_time }}s |" >> $GITHUB_STEP_SUMMARY
          echo "| Result | ✅ **MINTED** |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "![Nuclear Intelligence](https://img.shields.io/badge/Nuclear-Intelligence-v4.0-blue)" >> $GITHUB_STEP_SUMMARY