name: ⚛️ Nuclear Intelligence Operation Loop

on:
  # Run every 30 minutes for always-online autonomous operation
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      force_provider:
        description: 'Force provider (optional: huggingface, huggingface_free)'
        required: false
        default: ''
  push:
    branches: [main]

env:
  PYTHON_VERSION: '3.11'

jobs:
  cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-nuclear-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-nuclear-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -q -r requirements.txt

      - name: Initialize knowledge base
        run: python scripts/initialize_knowledge_base.py || true

      - name: Run Nuclear Intelligence Research Cycle
        id: cycle
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          AIMLAPI_API_KEY: ${{ secrets.AIMLAPI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          FIREWORKS_API_KEY: ${{ secrets.FIREWORKS_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          BLOCKCHAIN_SECRET: ${{ secrets.BLOCKCHAIN_SECRET }}
          DEVELOPER_MODE: "true"
        run: |
          python scripts/run_operation_cycle.py

      - name: Sync to HuggingFace Dataset
        if: always()
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_REPO: QalamHipHop/nuclear-intelligence
        run: |
          python scripts/sync_huggingface.py || true

      - name: Commit reports
        if: always()
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Auto: NES research cycle - ${{ github.run_id }}"
          file_pattern: |
            reports/*.json
            knowledge_base/*.json
          skip_dirty_check: true

  keepalive:
    runs-on: ubuntu-latest
    needs: cycle
    if: always()
    steps:
      - name: Ping HF Space
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://huggingface.co/spaces/Qalam/Nuclear-Intelligence)
          echo "HF Space Status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "⚠️ HF Space not responding, retrying in 10s..."
            sleep 10
            curl -s -o /dev/null -w "%{http_code}" https://huggingface.co/spaces/Qalam/Nuclear-Intelligence
          fi